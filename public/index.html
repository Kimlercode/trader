<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LLCM Trading</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; background:#0b0f14; color:#c9d1d9; }
  .container { max-width:900px; margin:30px auto; padding:20px; }
  .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
  .header h1 { font-size:24px; font-weight:600; letter-spacing:0.5px; }
  .status-badge { padding:5px 15px; border-radius:20px; font-size:14px; font-weight:600; }
  .status-running { background:#1a7f37; color:#fff; }
  .status-stopped { background:#cf222e; color:#fff; }
  .status-locked { background:#6e7681; color:#fff; }

  .dashboard { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:15px; margin-bottom:25px; }
  .card { background:#161b22; border:1px solid #30363d; border-radius:8px; padding:18px; }
  .card h3 { font-size:12px; text-transform:uppercase; letter-spacing:0.5px; color:#8b949e; margin-bottom:8px; }
  .card .value { font-size:28px; font-weight:600; }
  .green { color:#3fb950; } .red { color:#f85149; } .blue { color:#58a6ff; }

  .btn { padding:10px 25px; border:none; border-radius:6px; font-weight:600; cursor:pointer; transition:background 0.2s; }
  .btn-start { background:#238636; color:white; }
  .btn-start:hover { background:#2ea043; }
  .btn-stop { background:#da3633; color:white; }
  .btn-stop:hover { background:#f85149; }
  .btn:disabled { opacity:0.4; cursor:not-allowed; }

  .log-container { background:#0d1117; border:1px solid #30363d; border-radius:8px; padding:15px; margin-top:20px; }
  .log-container h2 { font-size:16px; margin-bottom:10px; color:#8b949e; }
  #logs { height:400px; overflow-y:auto; font-family:'Cascadia Code','Fira Code',monospace; font-size:13px; line-height:1.6; }
  .log-entry { padding:3px 0; border-bottom:1px solid #21262d; color:#c9d1d9; }
  .log-entry .time { color:#58a6ff; margin-right:10px; }

  .market-row { display:flex; gap:20px; margin-bottom:15px; }
  .market-info { flex:1; background:#161b22; border:1px solid #30363d; border-radius:8px; padding:12px; }
  .market-info h4 { color:#8b949e; font-size:12px; text-transform:uppercase; }
  .market-info .last-digit { font-size:24px; font-weight:600; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>⚡ LLCM Trading Engine</h1>
    <span id="statusBadge" class="status-badge status-stopped">Stopped</span>
  </div>

  <div class="dashboard">
    <div class="card">
      <h3>Account Balance</h3>
      <div class="value blue" id="balance">--</div>
    </div>
    <div class="card">
      <h3>Session P&L</h3>
      <div class="value" id="sessionPnL">0.00</div>
    </div>
    <div class="card">
      <h3>Take Profit</h3>
      <div class="value green">$10.00</div>
    </div>
    <div class="card">
      <h3>Stop Loss</h3>
      <div class="value red">$10.00</div>
    </div>
  </div>

  <div class="market-row">
    <div class="market-info">
      <h4>R_100 (Lead)</h4>
      <div>Last digit: <span class="last-digit" id="r100Digit">-</span></div>
    </div>
    <div class="market-info">
      <h4>R_25 (Follower)</h4>
      <div>Last digit: <span class="last-digit" id="r25Digit">-</span></div>
    </div>
  </div>

  <div>
    <button class="btn btn-start" id="startBtn" onclick="start()">▶ Start Trading</button>
    <button class="btn btn-stop" id="stopBtn" onclick="stop()" disabled>⏹ Stop</button>
  </div>

  <div class="log-container">
    <h2>Event Log</h2>
    <div id="logs"></div>
  </div>
</div>

<script>
const logsDiv = document.getElementById('logs');
const es = new EventSource('/api/logs');
es.onmessage = e => {
  const data = JSON.parse(e.data);
  if (data.state) updateUI(data.state);
  if (data.logs) {
    data.logs.forEach(l => {
      const div = document.createElement('div');
      div.className = 'log-entry';
      div.innerHTML = `<span class="time">${new Date(l.time).toLocaleTimeString()}</span>${l.message}`;
      logsDiv.appendChild(div);
    });
    logsDiv.scrollTop = logsDiv.scrollHeight;
  }
};

function updateUI(s) {
  document.getElementById('balance').textContent = s.balance ? `${parseFloat(s.balance).toFixed(2)} ${s.currency}` : '--';
  document.getElementById('sessionPnL').textContent = s.sessionPnL !== undefined ? (s.sessionPnL >=0 ? '+' : '') + s.sessionPnL.toFixed(2) : '0.00';
  document.getElementById('sessionPnL').className = 'value ' + (s.sessionPnL >= 0 ? 'green' : 'red');

  const badge = document.getElementById('statusBadge');
  if (s.locked) {
    badge.textContent = 'Locked';
    badge.className = 'status-badge status-locked';
  } else if (s.active) {
    badge.textContent = 'Running';
    badge.className = 'status-badge status-running';
  } else {
    badge.textContent = 'Stopped';
    badge.className = 'status-badge status-stopped';
  }

  document.getElementById('startBtn').disabled = s.active || s.locked;
  document.getElementById('stopBtn').disabled = !s.active;

  document.getElementById('r100Digit').textContent = s.r100?.digits?.slice(-1)[0] ?? '-';
  document.getElementById('r25Digit').textContent = s.r25?.lastDigit ?? '-';
}

function start() {
  fetch('/api/control', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({action:'start'})});
}
function stop() {
  fetch('/api/control', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({action:'stop'})});
}
</script>
</body>
</html>
