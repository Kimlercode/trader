<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under-6 Alpha Console</title>
  <style>
    :root {
      --bg-dark: #080a0f;
      --card-bg: #10141e;
      --accent-blue: #2979ff;
      --accent-green: #00e676;
      --accent-red: #ff1744;
      --text-main: #f1f3f5;
      --text-muted: #546e7a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background-color: var(--bg-dark); color: var(--text-main); padding: 2rem; }
    .container { max-width: 1000px; margin: 0 auto; }
    
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid #1a2232; padding-bottom: 1rem; }
    h1 { font-size: 1.25rem; font-weight: 700; color: #fff; letter-spacing: 0.5px; }
    
    .mode-selector { display: flex; background: #161c28; padding: 0.25rem; border-radius: 6px; border: 1px solid #222c3e; }
    .mode-btn { background: transparent; border: none; color: var(--text-muted); padding: 0.4rem 1.1rem; font-size: 0.8rem; font-weight: 600; cursor: pointer; border-radius: 4px; transition: all 0.2s; }
    .mode-btn.active.demo { background: var(--accent-blue); color: white; }
    .mode-btn.active.real { background: var(--accent-red); color: white; }
    .mode-btn:disabled { opacity: 0.2; cursor: not-allowed; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
    .card { background: var(--card-bg); padding: 1.5rem; border-radius: 8px; border: 1px solid #1a2232; }
    .card .label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem; }
    .card .value { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; }
    
    .pnl-pos { color: var(--accent-green); }
    .pnl-neg { color: var(--accent-red); }
    
    .controls { display: flex; gap: 1rem; margin-bottom: 2rem; }
    .btn { flex: 1; padding: 0.85rem; font-size: 0.9rem; font-weight: 700; border: none; border-radius: 6px; cursor: pointer; transition: background 0.2s; letter-spacing: 0.5px; }
    .btn-start { background: var(--accent-green); color: #000; }
    .btn-start:hover { background: #00c853; }
    .btn-stop { background: var(--accent-red); color: white; }
    .btn-stop:hover { background: #d50000; }
    .btn:disabled { opacity: 0.15; cursor: not-allowed; }

    .status-banner { background: #0d131f; border-left: 4px solid var(--accent-blue); padding: 1rem; border-radius: 4px; margin-bottom: 2rem; font-size: 0.9rem; color: #90a4ae; }

    .console { background: #04060a; border-radius: 8px; border: 1px solid #1a2232; padding: 1.5rem; }
    .console-header { font-size: 0.8rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1rem; border-bottom: 1px solid #1a2232; padding-bottom: 0.5rem; }
    .log-list { height: 380px; overflow-y: auto; font-family: "JetBrains Mono", Fira Code, Consolas, monospace; font-size: 0.8rem; line-height: 1.7; }
    .log-entry { margin-bottom: 0.3rem; border-bottom: 1px solid #080c14; padding-bottom: 0.3rem; display: flex; }
    .log-time { color: #37474f; margin-right: 1rem; flex-shrink: 0; }
    .log-msg { color: #b0bec5; white-space: pre-wrap; }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <div>
        <h1>Under-6 Quantum Core</h1>
        <div id="account-type" style="font-size:0.75rem; color:var(--text-muted); margin-top:0.25rem;">Routing check pending...</div>
      </div>
      
      <div class="mode-selector">
        <button id="btn-mode-demo" class="mode-btn active demo" onclick="changeMode('demo')">Virtual Environment</button>
        <button id="btn-mode-real" class="mode-btn real" onclick="changeMode('real')">Live Production Portfolio</button>
      </div>
    </header>

    <div id="banner-lock" class="status-banner" style="display: none;"></div>

    <div class="grid">
      <div class="card">
        <div class="label">Liquid Account Balance</div>
        <div id="val-balance" class="value">--</div>
      </div>
      <div class="card">
        <div class="label">Session Alpha P&L</div>
        <div id="val-pnl" class="value">$--</div>
      </div>
      <div class="card">
        <div class="label">Fixed Allocation Stake</div>
        <div id="val-stake" class="value">--</div>
      </div>
      <div class="card">
        <div class="label">Core Processor Unit</div>
        <div id="val-status" class="value" style="color: var(--accent-red);">STANDBY</div>
      </div>
    </div>

    <div class="controls">
      <button id="btn-start" class="btn btn-start" onclick="triggerAction('start')">Initiate Core Matrix</button>
      <button id="btn-stop" class="btn btn-stop" onclick="triggerAction('stop')" disabled>Emergency Halt</button>
    </div>

    <div class="console">
      <div class="console-header">High-Fidelity Telemetry Logs</div>
      <div id="log-container" class="log-list"></div>
    </div>
  </div>

  <script>
    let activeLogs = [];
    const sse = new EventSource('/api/logs');
    
    sse.onmessage = (event) => {
      const data = JSON.parse(event.data);
      if (data.state) updateUI(data.state);
      if (data.logs && data.logs.length > 0) {
        activeLogs = [...data.logs, ...activeLogs].slice(0, 200);
        renderLogs();
      }
    };

    function updateUI(state) {
      if (state.balance !== null) {
        document.getElementById('val-balance').innerText = `${parseFloat(state.balance).toFixed(2)} ${state.currency}`;
      }
      const pnlEl = document.getElementById('val-pnl');
      pnlEl.innerText = `${state.dailyPnl >= 0 ? '+' : ''}${state.dailyPnl.toFixed(2)} ${state.currency}`;
      pnlEl.className = 'value ' + (state.dailyPnl > 0 ? 'pnl-pos' : state.dailyPnl < 0 ? 'pnl-neg' : '');

      document.getElementById('val-stake').innerText = `$${state.currentStake.toFixed(2)}`;
      document.getElementById('account-type').innerText = `Current Vector: ${state.accountType}`;

      const statusEl = document.getElementById('val-status');
      if (state.locked) {
        statusEl.innerText = "CEASED"; statusEl.style.color = "var(--accent-red)";
      } else if (state.active) {
        statusEl.innerText = state.warmupComplete ? "ANALYZING" : "CALIBRATING";
        statusEl.style.color = "var(--accent-green)";
      } else {
        statusEl.innerText = "STANDBY"; statusEl.style.color = "var(--accent-red)";
      }

      const banner = document.getElementById('banner-lock');
      if (state.locked && state.lockReason) {
        banner.innerText = `Restriction Flagged: ${state.lockReason}`;
        banner.style.display = 'block';
      } else {
        banner.style.display = 'none';
      }

      document.getElementById('btn-start').disabled = state.active || state.locked;
      document.getElementById('btn-stop').disabled = !state.active;
      document.getElementById('btn-mode-demo').disabled = state.active;
      document.getElementById('btn-mode-real').disabled = state.active;
      document.getElementById('btn-mode-demo').classList.toggle('active', state.tradingMode === 'demo');
      document.getElementById('btn-mode-real').classList.toggle('active', state.tradingMode === 'real');
    }

    function renderLogs() {
      const container = document.getElementById('log-container');
      container.innerHTML = activeLogs.map(log => {
        const timeStr = new Date(log.time).toLocaleTimeString();
        return `<div class="log-entry"><span class="log-time">[${timeStr}]</span><span class="log-msg">${log.message}</span></div>`;
      }).join('');
    }

    async function changeMode(chosenMode) {
      try {
        const res = await fetch('/api/control', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'set_mode', mode: chosenMode })
        });
        if (!res.ok) { const err = await res.json(); alert(err.error || 'Configuration modification denied.'); }
      } catch (e) { console.error(e); }
    }

    async function triggerAction(actionName) {
      try {
        await fetch('/api/control', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: actionName })
        });
      } catch (e) { console.error(e); }
    }
  </script>
</body>
</html>
