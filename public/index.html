<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under-6 Digit Bot Control Panel</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            padding-bottom: 20px;
            margin-bottom: 25px;
        }
        h1 { margin: 0; font-size: 1.5rem; color: #38bdf8; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .card {
            background-color: #1e293b;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #334155;
        }
        .card-title {
            font-size: 0.85rem;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .card-value {
            font-size: 1.3rem;
            font-weight: bold;
        }
        .btn {
            padding: 10px 24px;
            border-radius: 6px;
            font-weight: 6px;
            cursor: pointer;
            border: none;
            font-size: 1rem;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn-start { background-color: #10b981; color: white; }
        .btn-stop { background-color: #ef4444; color: white; }
        #log-container {
            background-color: #020617;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 15px;
            height: 350px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        .log-entry { margin-bottom: 4px; display: flex; }
        .log-time { color: #64748b; margin-right: 10px; flex-shrink: 0; }
        .log-msg { color: #e2e8f0; word-break: break-all; }
        .status-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .status-active { background-color: #065f46; color: #34d399; }
        .status-idle { background-color: #1e293b; color: #94a3b8; }
        .status-locked { background-color: #7f1d1d; color: #fca5a5; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>Under-6 Digit Strategy Bot</h1>
            <div style="margin-top: 5px;">
                Status: <span id="bot-status" class="status-badge status-idle">IDLE</span>
            </div>
        </div>
        <div>
            <button id="ctrl-btn" class="btn btn-start" onclick="toggleBot()">Start Bot</button>
        </div>
    </header>

    <div class="grid">
        <div class="card">
            <div class="card-title">Account Type Context</div>
            <div id="val-account" class="card-value" style="color: #a78bfa;">Connecting...</div>
        </div>
        <div class="card">
            <div class="card-title">Current Balance</div>
            <div id="val-balance" class="card-value">--</div>
        </div>
        <div class="card">
            <div class="card-title">Daily Session P&L</div>
            <div id="val-pnl" class="card-value">0.00</div>
        </div>
        <div class="card">
            <div class="card-title">Warm-up Progression</div>
            <div id="val-warmup" class="card-value">0 / 500</div>
        </div>
    </div>

    <div class="card" style="margin-bottom: 15px; display: none;" id="lock-reason-box">
        <div class="card-title" style="color: #ef4444;">System Lock Reason</div>
        <div id="val-lock-reason" style="color: #fca5a5; font-weight: bold;"></div>
    </div>

    <h3>Application Execution Log</h3>
    <div id="log-container"></div>
</div>

<script>
    let isBotActive = false;

    // Open persistent SSE channel connection to look out for live UI mutations
    const evtSource = new EventSource("/api/logs");

    evtSource.onmessage = function(event) {
        const data = JSON.parse(event.data);
        
        if (data.state) {
            updateUIState(data.state);
        }
        if (data.logs) {
            renderNewLogs(data.logs);
        }
    };

    function updateUIState(state) {
        isBotActive = state.active;
        
        // Update core analytics view text blocks
        document.getElementById('val-account').innerText = state.accountType || 'Not Connected';
        document.getElementById('val-balance').innerText = state.balance !== null ? `${state.balance.toFixed(2)} ${state.currency}` : '--';
        
        const pnlEl = document.getElementById('val-pnl');
        pnlEl.innerText = state.dailyPnl.toFixed(2);
        pnlEl.style.color = state.dailyPnl > 0 ? '#10b981' : state.dailyPnl < 0 ? '#ef4444' : '#f8fafc';

        document.getElementById('val-warmup').innerText = state.warmupComplete ? "✅ Finished" : `${state.warmupTicksFed} / 500 Ticks`;

        // Manage action button layouts
        const btn = document.getElementById('ctrl-btn');
        if (state.active) {
            btn.innerText = "Stop Bot";
            btn.className = "btn btn-stop";
        } else {
            btn.innerText = "Start Bot";
            btn.className = "btn btn-start";
        }

        // Handle structural system status badges
        const badge = document.getElementById('bot-status');
        const lockBox = document.getElementById('lock-reason-box');
        
        if (state.locked) {
            badge.innerText = "LOCKED";
            badge.className = "status-badge status-locked";
            lockBox.style.display = "block";
            document.getElementById('val-lock-reason').innerText = state.lockReason;
        } else if (state.active) {
            badge.innerText = "RUNNING";
            badge.className = "status-badge status-active";
            lockBox.style.display = "none";
        } else {
            badge.innerText = "IDLE";
            badge.className = "status-badge status-idle";
            lockBox.style.display = "none";
        }
    }

    function renderNewLogs(logs) {
        const container = document.getElementById('log-container');
        logs.forEach(log => {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            
            const timeSpan = document.createElement('span');
            timeSpan.className = 'log-time';
            timeSpan.innerText = new Date(log.time).toLocaleTimeString();

            const msgSpan = document.createElement('span');
            msgSpan.className = 'log-msg';
            msgSpan.innerText = log.message;

            entry.appendChild(timeSpan);
            entry.appendChild(msgSpan);
            container.insertBefore(entry, container.firstChild);
        });
    }

    async function toggleBot() {
        const action = isBotActive ? 'stop' : 'start';
        try {
            const res = await fetch('/api/control', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action })
            });
            if (!res.ok) {
                const errData = await res.json();
                alert(`Error: ${errData.error || 'Execution failed'}`);
            }
        } catch (e) {
            alert("Could not reach backend configuration interface.");
        }
    }

    // Load static state on init window loading loop
    fetch('/api/state')
        .then(r => r.json())
        .then(updateUIState)
        .catch(() => console.error("Initial state collection faulted"));
</script>
</body>
</html>
