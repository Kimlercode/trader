<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Market Bot | Under 6</title>
    <style>
        :root {
            --bg-color: #0b0e11;
            --surface-color: #181a20;
            --surface-hover: #2b3139;
            --text-main: #EAECEF;
            --text-muted: #848E9C;
            --accent-green: #0ECB81;
            --accent-red: #F6465D;
            --accent-blue: #2962FF;
            --border-color: #2B3139;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 20px;
            height: 100vh;
        }

        .dashboard {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 100%;
        }

        /* Header Section */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface-color);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 600;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: var(--surface-hover);
        }

        .status-active { color: var(--accent-green); border: 1px solid var(--accent-green); background: rgba(14, 203, 129, 0.1); }
        .status-stopped { color: var(--text-muted); border: 1px solid var(--text-muted); }
        .status-locked { color: var(--accent-red); border: 1px solid var(--accent-red); background: rgba(246, 70, 93, 0.1); }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .stat-card {
            background: var(--surface-color);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .stat-card span.label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card span.value {
            font-size: 1.5rem;
            font-weight: 600;
            font-family: 'Courier New', Courier, monospace;
        }

        .positive { color: var(--accent-green); }
        .negative { color: var(--accent-red); }

        /* Controls */
        .controls {
            display: flex;
            gap: 15px;
            background: var(--surface-color);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-start {
            background-color: var(--accent-green);
            color: #fff;
        }
        .btn-start:hover:not(:disabled) {
            background-color: #0ba86b;
        }

        .btn-stop {
            background-color: var(--accent-red);
            color: #fff;
        }
        .btn-stop:hover:not(:disabled) {
            background-color: #d83a4d;
        }

        /* Logs Console */
        .logs-container {
            flex-grow: 1;
            background: var(--surface-color);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .logs-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .logs-body {
            flex-grow: 1;
            padding: 15px 20px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .log-entry {
            display: flex;
            gap: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            padding-bottom: 4px;
        }

        .log-time {
            color: var(--text-muted);
            min-width: 80px;
        }

        .log-msg {
            color: var(--text-main);
            word-break: break-word;
        }
        
        .log-msg.win { color: var(--accent-green); font-weight: bold; }
        .log-msg.loss { color: var(--accent-red); font-weight: bold; }
        .log-msg.alert { color: #f1c40f; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--surface-color); }
        ::-webkit-scrollbar-thumb { background: var(--surface-hover); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>
<body>

    <div class="dashboard">
        <header>
            <h1>Under 6 Algorithmic Bot</h1>
            <div id="statusBadge" class="status-badge status-stopped">Stopped</div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="label">Account Balance</span>
                <span class="value" id="balanceDisplay">--</span>
            </div>
            <div class="stat-card">
                <span class="label">Daily P&L</span>
                <span class="value" id="pnlDisplay">--</span>
            </div>
            <div class="stat-card">
                <span class="label">Take Profit (5%)</span>
                <span class="value positive" id="tpDisplay">--</span>
            </div>
            <div class="stat-card">
                <span class="label">Stop Loss (10%)</span>
                <span class="value negative" id="slDisplay">--</span>
            </div>
        </div>

        <div class="controls">
            <button id="btnStart" class="btn-start" onclick="controlBot('start')">Start Bot</button>
            <button id="btnStop" class="btn-stop" onclick="controlBot('stop')" disabled>Stop Bot</button>
        </div>

        <div class="logs-container">
            <div class="logs-header">Terminal Output</div>
            <div class="logs-body" id="logsBody">
                </div>
        </div>
    </div>

    <script>
        const logsBody = document.getElementById('logsBody');
        const statusBadge = document.getElementById('statusBadge');
        const balanceDisplay = document.getElementById('balanceDisplay');
        const pnlDisplay = document.getElementById('pnlDisplay');
        const tpDisplay = document.getElementById('tpDisplay');
        const slDisplay = document.getElementById('slDisplay');
        const btnStart = document.getElementById('btnStart');
        const btnStop = document.getElementById('btnStop');

        const currencyFormatter = new Intl.NumberFormat('en-US', {
            style: 'currency',
            currency: 'USD'
        });

        function formatCurrency(val, currency = 'USD') {
            if (val == null) return '--';
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: currency }).format(val);
        }

        // Handle SSE
        const eventSource = new EventSource('/api/logs');

        eventSource.onmessage = function(event) {
            const data = JSON.parse(event.data);
            
            // Update State
            if (data.state) {
                updateDashboard(data.state);
            }

            // Update Logs
            if (data.logs && data.logs.length > 0) {
                // Since logs come unshifted (newest first), we reverse them to append at bottom
                data.logs.reverse().forEach(log => appendLog(log));
            }
        };

        function updateDashboard(state) {
            // Update Status Badge
            if (state.locked) {
                statusBadge.textContent = 'Locked';
                statusBadge.className = 'status-badge status-locked';
            } else if (state.active) {
                statusBadge.textContent = state.warmupComplete ? 'Active' : 'Warming Up...';
                statusBadge.className = 'status-badge status-active';
            } else {
                statusBadge.textContent = 'Stopped';
                statusBadge.className = 'status-badge status-stopped';
            }

            // Update Buttons
            btnStart.disabled = state.active || state.locked;
            btnStop.disabled = !state.active;

            // Update Balance & PnL
            balanceDisplay.textContent = formatCurrency(state.balance, state.currency);
            
            pnlDisplay.textContent = formatCurrency(state.dailyPnl, state.currency);
            if (state.dailyPnl > 0) {
                pnlDisplay.className = 'value positive';
            } else if (state.dailyPnl < 0) {
                pnlDisplay.className = 'value negative';
            } else {
                pnlDisplay.className = 'value';
            }

            // Calculate & Display TP / SL based on daily Start Balance
            if (state.dailyStartBalance) {
                tpDisplay.textContent = formatCurrency(state.dailyStartBalance * 0.05, state.currency);
                slDisplay.textContent = formatCurrency(state.dailyStartBalance * 0.10, state.currency);
            } else if (state.balance) {
                // Preview limits before starting
                tpDisplay.textContent = formatCurrency(state.balance * 0.05, state.currency);
                slDisplay.textContent = formatCurrency(state.balance * 0.10, state.currency);
            }
        }

        function appendLog(log) {
            const timeStr = new Date(log.time).toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            const row = document.createElement('div');
            row.className = 'log-entry';

            const timeDiv = document.createElement('div');
            timeDiv.className = 'log-time';
            timeDiv.textContent = `[${timeStr}]`;

            const msgDiv = document.createElement('div');
            msgDiv.className = 'log-msg';
            msgDiv.textContent = log.message;

            // Colorize specific log keywords
            if (log.message.includes('WIN')) msgDiv.classList.add('win');
            if (log.message.includes('LOSS')) msgDiv.classList.add('loss');
            if (log.message.includes('Locked') || log.message.includes('target') || log.message.includes('stop-loss')) {
                msgDiv.classList.add('alert');
            }

            row.appendChild(timeDiv);
            row.appendChild(msgDiv);
            logsBody.appendChild(row);

            // Auto-scroll to bottom
            logsBody.scrollTop = logsBody.scrollHeight;
        }

        async function controlBot(action) {
            try {
                // Optimistic UI updates
                if(action === 'start') {
                    btnStart.disabled = true;
                } else {
                    btnStop.disabled = true;
                }

                const response = await fetch('/api/control', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action })
                });
                
                const data = await response.json();
                if (!response.ok || data.error) {
                    alert('Error: ' + (data.error || 'Failed to execute command'));
                    // Revert button state if failed
                    if(action === 'start') btnStart.disabled = false;
                    if(action === 'stop') btnStop.disabled = false;
                }
            } catch (err) {
                console.error(err);
                alert('Connection error');
            }
        }

        // Fetch initial state on load so the dashboard populates before the first SSE tick
        fetch('/api/state')
            .then(res => res.json())
            .then(state => updateDashboard(state))
            .catch(console.error);

    </script>
</body>
</html>
